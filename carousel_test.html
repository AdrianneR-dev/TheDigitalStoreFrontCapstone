<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .carousel-wrapper {
            position: relative;
            width: 100vw;
            height: 70vh;
            overflow: hidden;
            background: #ccc; /* visible if wrapper renders but images fail */
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-in-out;
        }

        .carousel-item {
            min-width: 100%;
            height: 100%;
            flex-shrink: 0;
        }

        .carousel-item a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 30px;
            padding: 16px 22px;
            cursor: pointer;
            border-radius: 50%;
            z-index: 10;
        }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }
    </style>
</head>
<body>

<div class="carousel-wrapper">
    <div class="carousel-track" id="carousel-track">
        <div class="carousel-item">
            <a href="sulfurbarsoap.html">
                <img src="images/sulfurbarsoap.webp" alt="Sulfur Bar Soap"/>
            </a>
        </div>
        <div class="carousel-item">
            <a href="activatedcharcoalsoapbar.html">
                <img src="images/charcoalbarsoap.webp" alt="Charcoal Bar Soap"/>
            </a>
        </div>
        <div class="carousel-item">
            <a href="seamossbarsoap.html">
                <img src="images/seamossbarsoap.webp" alt="Seamoss Bar Soap"/>
            </a>
        </div>
        <div class="carousel-item">
            <a href="seamosslotion.html">
                <img src="images/oilfreelotion.webp" alt="Oil Free Lotion"/>
            </a>
        </div>
    </div>
    <button class="carousel-btn prev-btn" id="prev-btn">&#10094;</button>
    <button class="carousel-btn next-btn" id="next-btn">&#10095;</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const track = document.getElementById("carousel-track");
    const nextBtn = document.getElementById("next-btn");
    const prevBtn = document.getElementById("prev-btn");
    const slides = Array.from(track.children);
    let currentIndex = 0;

    const updateCarousel = () => {
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
    };

    nextBtn.addEventListener("click", () => {
        currentIndex = currentIndex === slides.length - 1 ? 0 : currentIndex + 1;
        updateCarousel();
    });

    prevBtn.addEventListener("click", () => {
        currentIndex = currentIndex === 0 ? slides.length - 1 : currentIndex - 1;
        updateCarousel();
    });
});
</script>

</body>
</html>
